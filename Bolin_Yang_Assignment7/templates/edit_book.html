{% extends 'base.html' %}

{% block container %}
<main style="padding:40px; max-width:600px; margin:auto;">

    <h2>Edit Book</h2>
    <p style="color:#666; margin-bottom:20px;">Update the details for <em>{{ book.title }}</em></p>

    <form method="POST" action="{{ url_for('edit_book') }}">

        <!-- Hidden field to pass the book ID -->
        <input type="hidden" name="bookId" value="{{ book.bookId }}">

        <label>Title:</label><br>
        <input type="text" name="title" value="{{ book.title }}" required><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" value="{{ book.author }}" required><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" value="{{ book.isbn }}" required><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" value="{{ book.price }}" required><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" value="{{ book.image }}" placeholder="example.jpg" required><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required>
            {% for cat in categories %}
                <option value="{{ cat.categoryId }}"
                    {% if cat.categoryId == book.categoryId %}selected{% endif %}>
                    {{ cat.categoryName }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>
            <input type="checkbox" name="readNow" value="1"
                {% if book.readNow == 1 %}checked{% endif %}>
            Available to Read Now
        </label><br><br>

        <button type="submit" class="submitBtn">Save Changes</button>
        <a href="{{ url_for('book_detail', bookId=book.bookId) }}" class="cancelBtn">Cancel</a>

    </form>

</main>
{% endblock %}
